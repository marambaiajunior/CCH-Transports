<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CCH Logistics TMS</title>
  <meta name="description" content="Browser-based transportation management system for CCH Logistics.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-lockup">
        <div class="brand-mark">CCH</div>
        <div>
          <div class="brand-title">CCH Logistics</div>
          <div class="brand-subtitle">Brokerage TMS</div>
        </div>
      </div>
      <nav id="sideNav" class="side-nav" aria-label="Main navigation"></nav>
      <div class="sidebar-footer">
        <div class="tiny-label">Storage</div>
        <div>Private browser database</div>
        <div class="small text-white-50 mt-2">Use backup/export before clearing browser data. Humanity discovered fire, then LocalStorage.</div>
      </div>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <div>
          <div class="eyebrow" id="pageEyebrow">Transportation Management System</div>
          <h1 id="pageTitle">Dashboard</h1>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-light btn-sm" id="quickNewTrip">+ New Trip</button>
          <button class="btn btn-outline-light btn-sm" id="backupNow">Backup JSON</button>
        </div>
      </header>

      <div id="alertHost" class="alert-host"></div>
      <section id="view" class="content-view"></section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
